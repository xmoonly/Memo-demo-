<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=ZCOOL+XiaoWei&display=swap');
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; font-family:'ZCOOL XiaoWei','PingFang SC','Microsoft YaHei',sans-serif; }
body { background:linear-gradient(180deg,#060e1a 0%,#0a1e3d 40%,#0f2847 70%,#163a5c 100%); color:#c8ddf0; }

/* TOP BAR */
#top-bar { position:fixed;top:0;left:0;right:0;height:56px;z-index:100;background:linear-gradient(180deg,rgba(8,20,40,.97),rgba(10,28,55,.95));border-bottom:1px solid rgba(80,160,255,.15);box-shadow:0 2px 20px rgba(0,60,120,.3);display:flex;align-items:center;padding:0 16px;gap:8px; }
.game-title { font-family:'Great Vibes',cursive;font-size:28px;color:#7ab8f0;letter-spacing:3px;margin-right:auto;text-shadow:0 0 15px rgba(100,180,255,.35); }
.top-bar-btn { background:rgba(60,130,200,.15);border:1px solid rgba(80,160,255,.25);color:#a0ccf0;padding:6px 16px;border-radius:8px;font-size:13px;cursor:pointer;transition:all .2s; }
.top-bar-btn:hover { background:rgba(60,130,200,.3);color:#fff;border-color:rgba(100,180,255,.5); }
.top-bar-btn.active { background:rgba(60,130,200,.35);color:#fff; }
#gold-display { display:flex;align-items:center;gap:6px;padding:4px 14px;background:rgba(255,200,50,.08);border:1px solid rgba(255,200,50,.2);border-radius:8px;margin-left:8px; }
.gold-icon { width:20px;height:20px;background:radial-gradient(circle at 40% 35%,#ffe066,#cc9900);border-radius:50%;border:1.5px solid #b8860b;flex-shrink:0; }
#gold-count { color:#ffd740;font-weight:700;font-size:15px;min-width:40px; }
.gold-game-btn { background:linear-gradient(135deg,rgba(140,110,20,.35),rgba(180,140,30,.25));border-color:rgba(255,200,80,.3);color:#ffd740; }
.gold-game-btn:hover { background:linear-gradient(135deg,rgba(160,125,25,.5),rgba(200,155,35,.4));border-color:rgba(255,210,80,.5);color:#ffe680; }

/* SCREENS WITH FORCE CENTERING - Modified to prevent top cropping when overflowing */
.screen { position:fixed;top:56px;left:0;right:0;bottom:0;opacity:0;pointer-events:none;transition:opacity .35s ease;overflow-y:auto;overflow-x:hidden; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; padding:40px 20px; }
.screen.active { opacity:1;pointer-events:auto; }

/* MAIN SCREEN */
#screen-main { gap: 15px; }
.tanks-container { display:flex;flex-wrap:wrap;gap:20px;justify-content:center;align-items:center;padding:10px; width:100%; max-width:960px; margin-top: auto; margin-bottom: auto; }
.tank { width:280px;height:320px;border-radius:16px;position:relative;overflow:hidden;background:linear-gradient(180deg,rgba(10,40,80,.5),rgba(5,25,50,.8));border:1.5px solid rgba(80,160,255,.2);box-shadow:0 4px 30px rgba(0,60,140,.2),inset 0 0 40px rgba(30,100,200,.05); }
.tank-label { position:absolute;bottom:38px;left:0;right:0;text-align:center;font-size:11px;color:rgba(120,180,240,.6);letter-spacing:1px; }
.tank-quality { position:absolute;top:8px;right:10px;font-size:10px;color:rgba(120,180,240,.4); }
.tank-empty-hint { position:absolute;top:45%;left:50%;transform:translate(-50%,-50%);font-size:13px;color:rgba(100,160,220,.3);text-align:center; }
.tank-observe-btn { position:absolute;bottom:8px;left:50%;transform:translateX(-50%);padding:4px 14px;background:rgba(80,160,255,.15);border:1px solid rgba(80,160,255,.3);border-radius:6px;color:#a0ccf0;font-size:11px;cursor:pointer;transition:all 0.2s; font-family:inherit; }
.tank-observe-btn:hover { background:rgba(80,160,255,0.3); color:#fff; border-color:rgba(100,180,255,0.5); }
.main-actions { display:flex;flex-direction:column;gap:10px;justify-content:center;align-items:center;margin-top:10px; }
.action-btn { padding:14px 36px;font-size:15px;font-weight:600;background:linear-gradient(135deg,#1a5fa0,#2878c8);color:#e0f0ff;border:1.5px solid rgba(80,180,255,.4);border-radius:12px;cursor:pointer;box-shadow:0 4px 20px rgba(30,100,200,.3);transition:all .25s;letter-spacing:2px; font-family:inherit; }
.action-btn:hover { transform:translateY(-2px);box-shadow:0 6px 30px rgba(30,120,220,.5);background:linear-gradient(135deg,#2070b8,#3090e0); }
.action-btn.gold-btn { background:linear-gradient(135deg,#8a6d1b,#c49b30);border-color:rgba(255,200,80,.4);box-shadow:0 4px 20px rgba(180,140,0,.2); }
.action-btn.gold-btn:hover { background:linear-gradient(135deg,#a07e22,#d4ab40);box-shadow:0 6px 30px rgba(200,160,20,.4); }
.water-tip { font-size:12px; color:#ffd740; opacity:0.8; animation: blink 2s ease-in-out infinite; }

/* BUBBLES */
.bubble { position:absolute;border-radius:50%;background:radial-gradient(circle at 30% 30%,rgba(150,210,255,.15),rgba(80,160,240,.05));border:1px solid rgba(120,190,255,.1);animation:bubble-rise linear infinite; }
@keyframes bubble-rise { 0%{transform:translateY(0) translateX(0);opacity:.6}50%{transform:translateY(-50%) translateX(8px);opacity:.4}100%{transform:translateY(-100%) translateX(-4px);opacity:0} }

/* TANK DECORATIVE ASSETS */
.tank-weed-asset { position:absolute;bottom:0;width:4px;height:50px;background:linear-gradient(180deg,rgba(30,150,80,0.4),rgba(15,80,40,0.6));transform-origin:bottom center;animation:seaweed-sway 4s ease-in-out infinite; }
.tank-coral-asset { position:absolute;bottom:0;width:12px;height:24px;background:rgba(235,100,100,0.5);border-radius:4px 4px 0 0; }
.tank-pearl-asset { position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:12px;height:12px;border-radius:50%;background:#e0f0ff;box-shadow:0 0 10px #7ab8f0; }

/* CATCH SCENE - Fixed layout (inherits fixed full screen correctly, position:relative removed) */
#screen-catch { padding:0; display:block; }
.catch-ocean { position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(180deg,#030810 0%,#051525 15%,#071a33 30%,#0a2545 50%,#0c2a4f 65%,#0e3058 80%,#102848 100%);overflow:hidden; }
.catch-hint { position:absolute;top:20px;left:0;right:0;text-align:center;font-size:14px;color:rgba(120,180,240,.5);z-index:5;pointer-events:none;letter-spacing:2px; }
.catch-back-btn { position:absolute;top:16px;left:16px;z-index:10;background:rgba(20,50,90,.7);border:1px solid rgba(80,160,255,.25);color:#a0ccf0;padding:6px 16px;border-radius:8px;font-size:13px;cursor:pointer; font-family:inherit; }

/* CATCH SHIMMERING & DYNAMIC DRIFT SWIM EFFECT */
.catch-jf-clickable { position:absolute;cursor:pointer;z-index:10; transition: opacity 1.5s ease-in-out, transform 1.5s ease-in-out; }
.catch-jf-swim { animation: catch-swim-drift var(--dur, 12s) ease-in-out infinite; }

/* 改良型海洋水母自由移动+物理喷水呼吸动画组合效果 */
@keyframes catch-swim-drift {
  0% { transform: translate(0, 0) scale(1) rotate(0deg); }
  20% { transform: translate(var(--mx1, 30px), var(--my1, -20px)) scale(1.1, 0.88) rotate(5deg); }
  40% { transform: translate(calc(var(--mx1, 30px) * 0.8), calc(var(--my1, -20px) * 1.25)) scale(0.94, 1.06) rotate(-3deg); }
  60% { transform: translate(var(--mx2, -15px), var(--my2, -40px)) scale(1.1, 0.88) rotate(-7deg); }
  80% { transform: translate(var(--mx3, -30px), var(--my3, -15px)) scale(0.94, 1.06) rotate(3deg); }
  100% { transform: translate(0, 0) scale(1) rotate(0deg); }
}

/* JELLYFISH 2D SHAPE WITH BLINKING GLOW */
.jf-simple-shape {
  position: relative;
  transition: transform 0.2s;
  animation: soft-halo-pulse 3s ease-in-out infinite;
}
@keyframes soft-halo-pulse {
  0%, 100% { filter: drop-shadow(0 0 3px var(--halo-color)); }
  50% { filter: drop-shadow(0 0 11px var(--halo-color)); }
}

/* WATER JELLYFISH SWIM ANIMATION */
.swim-drift {
  animation: swim-float 12s ease-in-out infinite;
}
@keyframes swim-float {
  0%, 100% { transform: translate(0,0) rotate(0deg); }
  25% { transform: translate(15px, -15px) rotate(4deg); }
  50% { transform: translate(-10px, -30px) rotate(-3deg); }
  75% { transform: translate(-18px, -15px) rotate(2deg); }
}

/* PANORAMIC OBSERVE SCREEN */
#screen-observe { padding:0; display:block; }
.observe-ocean { position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(180deg,#020610 0%,#041228 35%,#061a35 70%,#082040 100%);overflow:hidden; }
.observe-jf { position:absolute;cursor:pointer;transition:transform 0.2s; z-index:15; }
.observe-jf:hover { filter: brightness(1.15); }
@keyframes observe-swim-anim {
  0% { transform: translate(0, 0) scaleX(1); }
  25% { transform: translate(50px, -40px) scaleX(1.02); }
  50% { transform: translate(-10px, -80px) scaleX(-1); }
  75% { transform: translate(-50px, -30px) scaleX(-1.02); }
  100% { transform: translate(0, 0) scaleX(1); }
}
/* Observe Popover Box */
.observe-popover {
  position: absolute;
  z-index: 200;
  background: rgba(5, 18, 38, 0.96);
  border: 1.5px solid rgba(80, 160, 255, 0.45);
  box-shadow: 0 0 25px rgba(80, 160, 255, 0.4);
  border-radius: 14px;
  padding: 16px;
  width: 250px;
  display: none;
  pointer-events: auto;
  font-size: 13px;
  line-height: 1.5;
}
.observe-popover h3 { color: #ffd740; font-size: 15px; margin-bottom: 4px; border-bottom: 1px solid rgba(255,255,255,0.15); padding-bottom: 4px; }
.observe-popover .pop-sci { font-style: italic; color: rgba(160,200,240,0.6); font-size: 11px; margin-bottom: 6px; }
.observe-popover .pop-text { color: #c8ddf0; margin-bottom: 8px; }
.observe-popover .pop-btn { padding: 4px 10px; background: rgba(240,80,80,0.15); border: 1px solid rgba(240,80,80,0.3); border-radius: 4px; color: #ff8080; cursor: pointer; float: right; font-family: inherit; font-size: 11px; }
.observe-popover .pop-btn:hover { background: rgba(240,80,80,0.3); color: #fff; }

/* DECOR DRAWER PANEL FOR TANKS */
.decor-panel {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(10, 30, 60, 0.95);
  border: 1.5px solid rgba(80, 160, 255, 0.4);
  border-radius: 16px;
  padding: 16px;
  width: 90%;
  max-width: 500px;
  z-index: 250;
  display: none;
  box-shadow: 0 4px 30px rgba(0,0,0,0.5);
  font-family: inherit;
}
.decor-panel.show { display: block; }
.decor-panel h3 { font-size: 14px; color: #ffd740; text-align: center; margin-bottom: 12px; }
.decor-panel-grid { display: flex; flex-direction: column; gap: 8px; }
.decor-panel-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(20, 50, 90, 0.5);
  padding: 8px 12px;
  border-radius: 8px;
  font-size: 12px;
}
.decor-panel-info { display: flex; align-items: center; gap: 8px; }
.decor-panel-icon { font-size: 20px; }
.decor-panel-nums { color: rgba(160, 200, 240, 0.8); }
.decor-panel-btns { display: flex; gap: 6px; }
.decor-panel-btn {
  padding: 4px 10px;
  border-radius: 4px;
  border: 1px solid rgba(80,160,255,0.4);
  background: rgba(80,160,255,0.15);
  color: #c8ddf0;
  font-size: 11px;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
}
.decor-panel-btn:hover:not(:disabled) { background: rgba(80,160,255,0.3); color: #fff; }
.decor-panel-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.decor-panel-btn.remove-btn { border-color: rgba(240,80,80,0.4); background: rgba(240,80,80,0.1); color: #ff8080; }
.decor-panel-btn.remove-btn:hover:not(:disabled) { background: rgba(240,80,80,0.2); }

/* DECORATIVE ELEMENTS */
.light-ray { position:absolute;top:-20%;width:3px;height:140%;background:linear-gradient(180deg,rgba(10,40,80,.08),rgba(80,160,240,.02),transparent);transform-origin:top center;pointer-events:none;animation:ray-sway 8s ease-in-out infinite; }
@keyframes ray-sway { 0%,100%{transform:rotate(var(--ray-r,0deg));opacity:var(--ray-o,.04)}50%{transform:rotate(calc(var(--ray-r,0deg) + 3deg));opacity:calc(var(--ray-o,.04) + .02)} }
.seaweed { position:absolute;bottom:0;width:8px;z-index:1;pointer-events:none; }
.seaweed-blade { position:absolute;bottom:0;width:6px;border-radius:3px 3px 1px 1px;background:linear-gradient(180deg,var(--sw-color,rgba(30,120,80,.35)),var(--sw-base,rgba(20,80,50,.5)));transform-origin:bottom center;animation:seaweed-sway var(--sw-dur,4s) ease-in-out infinite; }
@keyframes seaweed-sway { 0%,100%{transform:rotate(var(--sw-r1,-5deg)) scaleY(1)}25%{transform:rotate(var(--sw-r2,8deg)) scaleY(1.02)}50%{transform:rotate(var(--sw-r3,-3deg)) scaleY(.98)}75%{transform:rotate(var(--sw-r4,6deg)) scaleY(1.01)} }
.coral { position:absolute;bottom:0;z-index:1;pointer-events:none; }
.coral-branch { position:absolute;bottom:0;border-radius:40% 40% 5px 5px;transform-origin:bottom center; }
.plankton { position:absolute;width:2px;height:2px;border-radius:50%;background:rgba(15,35,65,.2);animation:plankton-float linear infinite;pointer-events:none;z-index:1; }
@keyframes plankton-float { 0%{transform:translate(0,0);opacity:.3}25%{transform:translate(10px,-15px);opacity:.5}50%{transform:translate(-5px,-30px);opacity:.3}75%{transform:translate(8px,-45px);opacity:.4}100%{transform:translate(0,-60px);opacity:0} }
.ocean-floor { position:absolute;bottom:0;left:0;right:0;height:40px;background:linear-gradient(180deg,transparent,rgba(60,50,30,.15) 40%,rgba(80,65,35,.25));z-index:0;pointer-events:none; }

/* QTE - Fixed layout with safe scrolling fallback */
#screen-qte { padding:0;display:flex;flex-direction:column; }
.qte-bg { position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(180deg,#040c18 0%,#0a1e3d 30%,#0e2a4f 60%,#122e52 100%); }
.qte-header { position:relative;z-index:2;padding:16px 20px;display:flex;justify-content:space-between;align-items:center; width: 100%; }
.qte-species-name { font-size:16px;color:#7ab8f0;font-weight:600; }
.qte-score-display { font-size:14px;color:#ffd740; }
.qte-combo { font-size:12px;color:#6dd47a;margin-left:12px; }
.qte-jellyfish-area { position:relative;z-index:2;flex:1;display:flex;align-items:center;justify-content:center;min-height:200px; }
.qte-lane { position:relative;z-index:2;height:120px;margin:0 20px 20px;background:rgba(10,30,60,.6);border:1px solid rgba(80,160,255,.15);border-radius:12px;overflow:hidden; width:calc(100% - 40px); max-width:900px; }

/* QTE LANE - Bright Yellow Hit Zone (Pure bright yellow, matching debug9 layout) */
.qte-hit-zone { position:absolute;left:100px;top:0;bottom:0;width:60px;background:rgba(255, 215, 0, 0.16);border-left:2px solid #ffd740;border-right:2px solid #ffd740; }
.qte-hit-zone-label { position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);font-size:10px;color:#ffd740;font-weight: bold; }

.qte-arrow { position:absolute;top:50%;transform:translateY(-50%);width:44px;height:44px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;color:#7ab8f0;border-radius:10px;border:2px solid rgba(80,160,255,.4);background:rgba(20,50,90,.7); }
.qte-arrow.hit-perfect{border-color:#ffd740;color:#ffd740;box-shadow:0 0 20px rgba(255,215,0,.4)}.qte-arrow.hit-good{border-color:#6dd47a;color:#6dd47a;box-shadow:0 0 15px rgba(100,210,120,.3)}.qte-arrow.hit-ok{border-color:#c89df0;color:#c89df0}.qte-arrow.missed{border-color:rgba(240,80,80,.5);color:rgba(240,80,80,.5);opacity:.4}
.qte-feedback { position:absolute;z-index:10;left:130px;top:50%;transform:translateY(-50%);font-size:18px;font-weight:700;pointer-events:none;opacity:0;transition:opacity .15s; }
.qte-feedback.show{opacity:1}.qte-feedback.perfect{color:#ffd740;text-shadow:0 0 10px rgba(255,215,0,.5)}.qte-feedback.good{color:#6dd47a}.qte-feedback.ok{color:#c89df0}.qte-feedback.miss{color:#f06070}
.qte-results { position:absolute;z-index:20;top:0;left:0;right:0;bottom:0;background:rgba(4,12,24,.9);display:none;align-items:center;justify-content:center;backdrop-filter:blur(6px); }
.qte-results.show{display:flex}
.qte-results-card { background:linear-gradient(180deg,rgba(12,30,60,.95),rgba(8,22,45,.98));border:1px solid rgba(80,160,255,.2);border-radius:16px;padding:30px 40px;text-align:center;min-width:300px; }
.qte-results-card button { margin-top:16px;padding:10px 30px;background:linear-gradient(135deg,#1a5fa0,#2878c8);color:#e0f0ff;border:1px solid rgba(80,180,255,.3);border-radius:10px;font-size:14px;cursor:pointer;transition:all .2s; }
.qte-results-card button:hover{background:linear-gradient(135deg,#2070b8,#3090e0)}

/* SHOP & INVENTORY CENTERING WRAPPERS */
.shop-inner-wrapper, .inv-inner-wrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100%;
  margin-top: auto;
  margin-bottom: auto;
}

/* SHOP WITH SIDEBAR */
#screen-shop { display: flex; flex-direction: column; align-items: center; justify-content: flex-start; }
.shop-header{text-align:center;font-size:22px;color:#7ab8f0;margin-bottom:20px;letter-spacing:3px}
.shop-container{display:flex;gap:20px;width:100%;max-width:900px;margin: 0 auto;align-items:flex-start}
.shop-sidebar{display:flex;flex-direction:column;gap:10px;width:160px;flex-shrink:0}
.shop-sidebar-btn{background:rgba(15,35,65,.6);border:1px solid rgba(80,160,255,.15);color:#a0ccf0;padding:12px;border-radius:8px;cursor:pointer;text-align:left;transition:all .2s;font-family:inherit;font-size:13px}
.shop-sidebar-btn:hover{background:rgba(25,55,95,.8);border-color:rgba(100,180,255,.4);color:#fff}
.shop-sidebar-btn.active{background:rgba(30,80,150,.5);border-color:rgba(100,180,255,.6);color:#fff;box-shadow:0 0 10px rgba(80,160,255,.2)}
.shop-content{flex:1}
.shop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;width:100%}
.shop-item{background:rgba(15,35,65,.6);border:1px solid rgba(80,160,255,.15);border-radius:12px;padding:20px;transition:all .25s}
.shop-item:hover{border-color:rgba(100,180,255,.35)}.shop-item h3{color:#8cc4f0;font-size:15px;margin-bottom:6px}.shop-item .shop-desc{font-size:12px;color:rgba(150,190,230,.6);margin-bottom:12px}.shop-item .shop-cost{color:#ffd740;font-size:14px;font-weight:600}
.shop-buy-btn{display:block;width:100%;margin-top:10px;padding:8px;background:rgba(60,130,200,.2);border:1px solid rgba(80,160,255,.25);color:#a0ccf0;border-radius:8px;cursor:pointer;font-size:13px;transition:all .2s}
.shop-buy-btn:hover{background:rgba(60,130,200,.4);color:#fff}.shop-buy-btn:disabled{opacity:.3;cursor:not-allowed}

/* ENCYCLOPEDIA (SQUARE 4x4 GRID) */
.ency-header { text-align:center;font-size:22px;color:#7ab8f0;margin-bottom:20px;letter-spacing:3px; }
.ency-grid { display:grid;grid-template-columns:repeat(4, 150px);gap:16px;width:100%;max-width:700px;justify-content:center;margin: auto 0; }
.ency-card { background:rgba(15,35,65,.6);border:1px solid rgba(80,160,255,.15);border-radius:12px;padding:12px;text-align:center;cursor:pointer;transition:all .25s;position:relative;min-height:160px;display:flex;flex-direction:column;align-items:center;justify-content:center; }
.ency-card:hover { border-color:rgba(100,180,255,.4);background:rgba(20,45,80,.7);transform:translateY(-3px); }
.ency-card.undiscovered .jf-preview { filter:brightness(0) saturate(0);opacity:0.15; }
.ency-card .ency-name { font-size:13px;margin-top:10px;color:#8cc4f0; }
.ency-card .ency-sci { font-size:10px;color:rgba(120,170,220,.5);font-style:italic;margin-top:2px; }
.ency-card.undiscovered .ency-name { color:rgba(120,170,220,.3); }
.ency-card .ency-rarity { position:absolute;top:8px;right:10px;font-size:10px; }
.rarity-1{color:#8cc4f0}.rarity-2{color:#6dd47a}.rarity-3{color:#c89df0}.rarity-4{color:#f0a84d}.rarity-5{color:#f06070}
.ency-detail-overlay { position:fixed;top:0;left:0;right:0;bottom:0;z-index:200;background:rgba(4,12,24,.85);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center; }
.ency-detail-overlay.show { display:flex; }
.ency-detail { background:linear-gradient(180deg,rgba(12,30,60,.95),rgba(8,22,45,.98));border:1px solid rgba(80,160,255,.2);border-radius:16px;padding:30px;max-width:520px;width:90%;max-height:80vh;overflow-y:auto;box-shadow:0 8px 60px rgba(0,40,100,.4); }
.ency-detail-close { float:right;background:none;border:none;color:#7ab8f0;font-size:22px;cursor:pointer; }

/* STAGE 1: Logo Screen */

const AudioEngine={
  ctx:null,masterGain:null,
  activeOscillators:[],
  bgmInterval:null,bgmPlaying:false,melodyIndex:0,nextMelodyTime:0,nextRaindropTime:0,
  init(){this.ctx=new(window.AudioContext||window.webkitAudioContext)();this.masterGain=this.ctx.createGain();this.masterGain.gain.value=0.5;this.masterGain.connect(this.ctx.destination)},
  resume(){if(this.ctx&&this.ctx.state==='suspended')this.ctx.resume()},
  midiToFreq(m){return 440*Math.pow(2,(m-69)/12)},
  playNote(freq,t,dur){
    const c=this.ctx,end=t+Math.max(dur,.7);
    const o1=c.createOscillator();o1.type='sine';o1.frequency.value=freq;
    const g1=c.createGain();g1.gain.setValueAtTime(0,t);g1.gain.linearRampToValueAtTime(.35,t+.004);g1.gain.exponentialRampToValueAtTime(.001,t+Math.min(dur*.8,.6));
    o1.connect(g1);g1.connect(this.masterGain);
    const o2=c.createOscillator();o2.type='sine';o2.frequency.value=freq*3;
    const g2=c.createGain();g2.gain.setValueAtTime(0,t);g2.gain.linearRampToValueAtTime(.08,t+.003);g2.gain.exponentialRampToValueAtTime(.001,t+.2);
    o2.connect(g2);g2.connect(this.masterGain);
    const o3=c.createOscillator();o3.type='sine';o3.frequency.value=freq*5.04;
    const g3=c.createGain();g3.gain.setValueAtTime(0,t);g3.gain.linearRampToValueAtTime(.04,t+.002);g3.gain.exponentialRampToValueAtTime(.001,t+.12);
    o3.connect(g3);g3.connect(this.masterGain);
    [o1,o2,o3].forEach(o=>{
      o.start(t);o.stop(end);
      this.activeOscillators.push(o);
    })
  },
  stopAllScheduled(){
    this.activeOscillators.forEach(o=>{
      try{o.stop();}catch(e){}
    });
    this.activeOscillators=[];
  },
  schedulePiece(pid){
    const p=BACH_PIECES[pid];if(!p)return{duration:0,beatTimes:[]};
    const spb=60/p.bpm,st=this.ctx.currentTime+.3,bts=[],bs=new Set();
    p.notes.forEach(([m,b,d])=>{this.playNote(this.midiToFreq(m),st+b*spb,d*spb);const rb=Math.round(b*2)/2;if(!bs.has(rb)){bs.add(rb);bts.push({beat:rb,time:st+rb*spb})}});
    bts.sort((a,b)=>a.beat-b.beat);const ln=p.notes[p.notes.length-1];
    return{startTime:st,duration:(ln[1]+ln[2])*spb+.5,beatTimes:bts,bpm:p.bpm,secPerBeat:spb}
  },
  playSfx(type){
    if(!this.ctx)return;const n=this.ctx.currentTime,o=this.ctx.createOscillator(),g=this.ctx.createGain();
    o.connect(g);g.connect(this.masterGain);
    if(type==='hit'){o.type='sine';o.frequency.value=880;g.gain.setValueAtTime(.15,n);g.gain.exponentialRampToValueAtTime(.001,n+.15);o.start(n);o.stop(n+.15)}
    else if(type==='miss'){o.type='sawtooth';o.frequency.value=200;g.gain.setValueAtTime(.1,n);g.gain.exponentialRampToValueAtTime(.001,n+.2);o.start(n);o.stop(n+.2)}
    else if(type==='catch'){o.type='sine';o.frequency.setValueAtTime(523,n);o.frequency.linearRampToValueAtTime(1047,n+.3);g.gain.setValueAtTime(.2,n);g.gain.exponentialRampToValueAtTime(.001,n+.4);o.start(n);o.stop(n+.4)}
    else if(type==='mb_win'){
      const notes = [1047, 1319, 1568];
      notes.forEach((freq, idx) => {
        const t = n + idx * 0.1;
        const osc = this.ctx.createOscillator(); osc.type = 'sine'; osc.frequency.value = freq;
        const gain = this.ctx.createGain();
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(0.25, t + 0.005);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
        osc.connect(gain); gain.connect(this.masterGain);
        osc.start(t); osc.stop(t + 0.6);
      });
    }
    else if(type==='mb_lose'){
      const notes = [880, 830];
      notes.forEach((freq, idx) => {
        const t = n + idx * 0.15;
        const osc = this.ctx.createOscillator(); osc.type = 'sine'; osc.frequency.value = freq;
        const gain = this.ctx.createGain();
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(0.2, t + 0.005);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
        osc.connect(gain); gain.connect(this.masterGain);
        osc.start(t); osc.stop(t + 0.7);
      });
    }
    else if(type==='mb_click'){
      const osc = this.ctx.createOscillator(); osc.type = 'sine'; osc.frequency.value = 1175;
      const gain = this.ctx.createGain();
      gain.gain.setValueAtTime(0, n);
      gain.gain.linearRampToValueAtTime(0.2, n + 0.003);
      gain.gain.exponentialRampToValueAtTime(0.001, n + 0.4);
      osc.connect(gain); gain.connect(this.masterGain);
      osc.start(n); osc.stop(n + 0.55);
    }
  },
  /* Raindrop Prelude Op.28 No.15 Background Synth BGM */
  playBgm(){
    if(this.bgmPlaying) return;
    this.resume();
    this.bgmPlaying = true;
    
    const bpm = 65;
    const stepTime = 60 / bpm;
    
    const melody = [
      [65, 0.5], [68, 0.5], [66, 1], [65, 1], [63, 1], 
      [65, 1], [61, 2], [61, 1],
      [63, 1], [65, 1], [66, 1], [68, 1], [70, 1.5], [68, 0.5], [66, 1], [65, 1],
      [63, 3], [65, 0.5], [68, 0.5], [66, 1], [65, 1], [63, 1],
      [65, 1], [61, 2], [61, 1]
    ];
    
    this.melodyIndex = 0;
    this.nextMelodyTime = this.ctx.currentTime;
    this.nextRaindropTime = this.ctx.currentTime;
    
    const schedule = () => {
      if(!this.bgmPlaying) return;
      const now = this.ctx.currentTime;
      
      while(this.nextRaindropTime < now + 0.3) {
        this.playRaindropNote(68, this.nextRaindropTime, stepTime * 0.4);
        this.nextRaindropTime += stepTime / 2;
      }
      
      while(this.nextMelodyTime < now + 0.3) {
        const item = melody[this.melodyIndex];
        if(item) {
          const midi = item[0];
          const dur = item[1] * stepTime;
          if(midi > 0) {
            this.playMelodyNote(midi, this.nextMelodyTime, dur * 0.9);
          }
          this.nextMelodyTime += dur;
          this.melodyIndex = (this.melodyIndex + 1) % melody.length;
        } else {
          this.nextMelodyTime += stepTime;
        }
      }
      
      this.bgmInterval = setTimeout(schedule, 100);
    };
    
    schedule();
  },
  stopBgm(){
    this.bgmPlaying = false;
    if(this.bgmInterval) clearTimeout(this.bgmInterval);
  },
  playRaindropNote(midi, t, dur){
    const freq = this.midiToFreq(midi);
    const o = this.ctx.createOscillator(); o.type = 'sine'; o.frequency.value = freq;
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.04, t + 0.005);
    g.gain.exponentialRampToValueAtTime(0.001, t + Math.min(dur, 0.15));
    o.connect(g); g.connect(this.masterGain);
    o.start(t); o.stop(t + dur);
  },
  playMelodyNote(midi, t, dur){
    const freq = this.midiToFreq(midi);
    const o1 = this.ctx.createOscillator(); o1.type = 'sine'; o1.frequency.value = freq;
    const g1 = this.ctx.createGain();
    g1.gain.setValueAtTime(0, t);
    g1.gain.linearRampToValueAtTime(0.12, t + 0.005);
    g1.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o1.connect(g1); g1.connect(this.masterGain);
    
    const o2 = this.ctx.createOscillator(); o2.type = 'sine'; o2.frequency.value = freq * 2;
    const g2 = this.ctx.createGain();
    g2.gain.setValueAtTime(0, t);
    g2.gain.linearRampToValueAtTime(0.04, t + 0.003);
    g2.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
    o2.connect(g2); g2.connect(this.masterGain);
    
    o1.start(t); o1.stop(t + dur + 0.2);
    o2.start(t); o2.stop(t + dur + 0.2);
  }
};

/* === TANK MANAGER === */
const TankManager={
  render(){
    const c=document.getElementById('tanks-container');c.innerHTML='';
    GameState.state.tanks.forEach((tank,idx)=>{
      const el=document.createElement('div');el.className='tank';
      el.innerHTML=`<div class="tank-quality">品质 ${'★'.repeat(tank.quality)}${'☆'.repeat(5-tank.quality)}</div><div class="tank-label">水母缸 #${idx+1}</div>`;
      
      // Bubbles
      for(let i=0;i<5;i++){const b=document.createElement('div');b.className='bubble';const sz=4+Math.random()*8;b.style.cssText=`width:${sz}px;height:${sz}px;left:${10+Math.random()*80}%;bottom:${Math.random()*30}%;animation-duration:${3+Math.random()*4}s;animation-delay:${Math.random()*3}s;`;el.appendChild(b)}
      
      // Render decors if placed in THIS tank
      if(tank.decor && tank.decor.decor_weed > 0) {
        for(let i=0; i<Math.min(5, tank.decor.decor_weed); i++) {
          const w = document.createElement('div'); w.className = 'tank-weed-asset';
          w.style.left = (15 + i*18 + Math.random()*8) + 'px';
          w.style.height = (35 + Math.random()*20) + 'px';
          w.style.animationDelay = (i*-0.5)+'s';
          el.appendChild(w);
        }
      }
      if(tank.decor && tank.decor.decor_coral > 0) {
        for(let i=0; i<Math.min(3, tank.decor.decor_coral); i++) {
          const cr = document.createElement('div'); cr.className = 'tank-coral-asset';
          cr.style.right = (15 + i*22) + 'px';
          cr.style.height = (12 + Math.random()*15) + 'px';
          el.appendChild(cr);
        }
      }
      if(tank.decor && tank.decor.decor_pearl > 0) {
        const pr = document.createElement('div'); pr.className = 'tank-pearl-asset';
        el.appendChild(pr);
      }

      // Jellyfish with fluid free swim floating animation, no labels
      if(tank.jellyfish && tank.jellyfish.length > 0){
        tank.jellyfish.forEach((jfId,ji)=>{
          const sp=SPECIES.find(s=>s.id===jfId);if(!sp)return;
          const swimWrap = document.createElement('div');
          swimWrap.className = 'swim-drift';
          swimWrap.style.position = 'absolute';
          swimWrap.style.left=(15+(ji%3)*80)+'px';
          swimWrap.style.top=(40+Math.floor(ji/3)*100)+'px';
          swimWrap.style.animationDelay=(ji * -1.8)+'s';
          swimWrap.style.animationDuration=(10 + Math.random()*6)+'s';
          
          const jf=JellyfishRenderer.create(sp,.52);
          swimWrap.appendChild(jf);
          el.appendChild(swimWrap);
        });
      }else{el.innerHTML+='<div class="tank-empty-hint">空缸<br><span style="font-size:10px;opacity:0.5">打捞水母来填满它</span></div>'}
      
      // Observe button
      const obsBtn = document.createElement('button');
      obsBtn.className = 'tank-observe-btn';
      obsBtn.textContent = '观察水母缸';
      obsBtn.onclick = () => ScreenManager.show('observe', idx);
      el.appendChild(obsBtn);
      
      c.appendChild(el);
    });
  }
};

const CatchScene={
  jfElements:[],spawnTimer:null,decorated:false,
  enter(){
    const ocean=document.getElementById('catch-ocean');ocean.innerHTML='';CatchScene.jfElements=[];
    CatchScene.buildOceanDecor(ocean);
    setTimeout(()=>CatchScene.spawnWave(ocean), 100);
    CatchScene.spawnTimer=setInterval(()=>CatchScene.spawnWave(ocean),8000);
  },
  buildOceanDecor(ocean){
    const floor=document.createElement('div');floor.className='ocean-floor';ocean.appendChild(floor);
    for(let i=0;i<8;i++){
      const r=document.createElement('div');r.className='light-ray';
      r.style.left=(5+i*12+Math.random()*4)+'%';
      r.style.setProperty('--ray-r',(-10+i*3)+'deg');
      r.style.setProperty('--ray-o',(0.02+Math.random()*0.04).toFixed(3));
      r.style.animationDuration=(6+Math.random()*6)+'s';
      r.style.animationDelay=(Math.random()*4)+'s';
      r.style.width=(2+Math.random()*3)+'px';
      ocean.appendChild(r);
    }
    const swCount=6+Math.floor(Math.random()*5);
    for(let i=0;i<swCount;i++){
      const sw=document.createElement('div');sw.className='seaweed';
      sw.style.left=(5+Math.random()*90)+'%';
      const blades=2+Math.floor(Math.random()*3);
      const hue=100+Math.random()*40;
      for(let j=0;j<blades;j++){
        const blade=document.createElement('div');blade.className='seaweed-blade';
        const bh=40+Math.random()*60;
        blade.style.height=bh+'px';
        blade.style.left=(j*4-blades*2)+'px';
        blade.style.setProperty('--sw-color',`hsla(${hue},45%,35%,0.35)`);
        blade.style.setProperty('--sw-base',`hsla(${hue},50%,22%,0.5)`);
        blade.style.setProperty('--sw-dur',(3+Math.random()*3)+'s');
        blade.style.setProperty('--sw-r1',(-8+Math.random()*4)+'deg');
        blade.style.setProperty('--sw-r2',(5+Math.random()*6)+'deg');
        blade.style.setProperty('--sw-r3',(-4+Math.random()*3)+'deg');
        blade.style.setProperty('--sw-r4',(3+Math.random()*5)+'deg');
        blade.style.animationDelay=(Math.random()*2)+'s';
        sw.appendChild(blade);
      }
      ocean.appendChild(sw);
    }
    const coralCount=4+Math.floor(Math.random()*4);
    for(let i=0;i<coralCount;i++){
      const coral=document.createElement('div');coral.className='coral';
      coral.style.left=(8+Math.random()*84)+'%';
      const branches=3+Math.floor(Math.random()*4);
      const baseHue=Math.random()>0.5?(340+Math.random()*30):(15+Math.random()*25);
      for(let j=0;j<branches;j++){
        const br=document.createElement('div');br.className='coral-branch';
        const bh=15+Math.random()*30;
        const bw=6+Math.random()*10;
        br.style.height=bh+'px';br.style.width=bw+'px';
        br.style.left=(j*12-branches*6)+'px';
        br.style.background=`hsla(${baseHue},50%,${35+Math.random()*15}%,${0.25+Math.random()*0.15})`;
        br.style.transform=`rotate(${-15+Math.random()*30}deg)`;
        if(Math.random()>0.4){
          const sub=document.createElement('div');sub.className='coral-branch';
          const sh=8+Math.random()*14;
          sub.style.height=sh+'px';sub.style.width=(bw*0.6)+'px';
          sub.style.bottom=bh*0.5+'px';
          sub.style.left=(Math.random()>0.5?bw*0.6:-bw*0.3)+'px';
          sub.style.background=`hsla(${baseHue},55%,${40+Math.random()*15}%,${0.2+Math.random()*0.1})`;
          sub.style.transform=`rotate(${-25+Math.random()*50}deg)`;
          br.appendChild(sub);
        }
        coral.appendChild(br);
      }
      ocean.appendChild(coral);
    }
    for(let i=0;i<15;i++){
      const p=document.createElement('div');p.className='plankton';
      p.style.left=(Math.random()*100)+'%';
      p.style.top=(20+Math.random()*70)+'%';
      p.style.animationDuration=(4+Math.random()*6)+'s';
      p.style.animationDelay=(Math.random()*5)+'s';
      p.style.width=(2+Math.random()*2)+'px';p.style.height=p.style.width;
      ocean.appendChild(p);
    }
    for(let i=0;i<8;i++){
      const b=document.createElement('div');b.className='bubble';
      const sz=3+Math.random()*6;
      b.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*95}%;bottom:${Math.random()*15}%;animation-duration:${4+Math.random()*5}s;animation-delay:${Math.random()*4}s;`;
      ocean.appendChild(b);
    }
  },
  spawnWave(ocean){
    if(!ocean)return;
    
    // Smooth fade-out of previous wave (1.5s transition rising up)
    ocean.querySelectorAll('.catch-jf-clickable').forEach(el=>{
      el.style.transition = 'opacity 1.5s ease-in-out, transform 1.5s ease-in-out';
      el.style.opacity='0';
      el.style.transform='scale(0.3) translateY(-100px)';
      setTimeout(()=>{if(el.parentNode) el.parentNode.removeChild(el)}, 1500);
    });
    
    const ow=window.innerWidth || 800;
    const oh=(window.innerHeight-56) || 600;

    const speciesCount={};const picks=[];
    let attempts=0;
    while(picks.length<9 && attempts<100){
      attempts++;
      const sp=CatchScene.pickSpecies();
      if(!sp) continue;
      const cnt=speciesCount[sp.id]||0;
      if(cnt<3){speciesCount[sp.id]=cnt+1;picks.push(sp)}
    }
    
    const cols=3,rows=3;
    const cellW=Math.max(80, Math.floor((ow-100)/cols));
    const cellH=Math.max(80, Math.floor((oh-100)/rows));
    
    picks.forEach((sp,i)=>{
      const col=i%cols,row=Math.floor(i/cols);
      const el=document.createElement('div');el.className='catch-jf-clickable';
      el.style.position='absolute';
      
      const jf=JellyfishRenderer.create(sp, 1.15);
      jf.className += ' catch-jf-swim';
      
      // Random CSS drift variable configurations with wide free-swim boundaries
      const dur = 10 + Math.random() * 8;
      const mx1 = -80 + Math.random() * 160;
      const my1 = -60 + Math.random() * 120;
      const mx2 = -80 + Math.random() * 160;
      const my2 = -80 + Math.random() * 160;
      const mx3 = -80 + Math.random() * 160;
      const my3 = -60 + Math.random() * 120;
      
      jf.style.setProperty('--dur', `${dur}s`);
      jf.style.setProperty('--mx1', `${mx1}px`);
      jf.style.setProperty('--my1', `${my1}px`);
      jf.style.setProperty('--mx2', `${mx2}px`);
      jf.style.setProperty('--my2', `${my2}px`);
      jf.style.setProperty('--mx3', `${mx3}px`);
      jf.style.setProperty('--my3', `${my3}px`);
      
      el.appendChild(jf);
      
      const baseX=50+col*cellW+Math.random()*Math.max(5, (cellW-90));
      const baseY=40+row*cellH+Math.random()*Math.max(5, (cellH-90));
      
      el.style.left=baseX+'px';el.style.top=baseY+'px';
      
      // Smooth gradual fade-in entrance from depths
      el.style.opacity='0';
      el.style.transform='scale(0.1) translateY(80px)';
      
      el.dataset.speciesId=sp.id;
      el.addEventListener('click',()=>{
        if(CatchScene.spawnTimer)clearInterval(CatchScene.spawnTimer);
        CatchScene.spawnTimer=null;
        QTESystem.start(sp.id);
      });
      ocean.appendChild(el);
      
      // Smoothly activate transition after insertion
      setTimeout(()=>{
        el.style.opacity='1';
        el.style.transform='scale(1) translateY(0)';
      }, 50);
    });
  },
  pickSpecies(){
    const weights=SPECIES.map(s=>6-s.rarity);
    const total=weights.reduce((a,b)=>a+b,0);
    let r=Math.random()*total;
    for(let i=0;i<SPECIES.length;i++){r-=weights[i];if(r<=0)return SPECIES[i]}
    return SPECIES[0];
  },
  leave(){if(CatchScene.spawnTimer){clearInterval(CatchScene.spawnTimer);CatchScene.spawnTimer=null}}
};

/* === QTE SYSTEM === */
const QTESystem={
  session:null,rafId:null,keyHandler:null,startTimeout:null,
  DIRS:['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'],
  SYM:{ArrowUp:'↑',ArrowDown:'↓',ArrowLeft:'←',ArrowRight:'→'},
  start(speciesId){
    AudioEngine.stopBgm(); // Pause Chopin BGM
    AudioEngine.resume();CatchScene.leave();
    const sp=SPECIES.find(s=>s.id===speciesId);if(!sp)return;
    
    // Smoothly initialize target UI elements before the blank phase begins
    document.getElementById('qte-species-name').textContent='打捞: '+sp.name;
    document.getElementById('qte-score').textContent='0';
    document.getElementById('qte-combo').textContent='';
    document.getElementById('qte-results').classList.remove('show');
    
    const lane=document.getElementById('qte-lane');
    lane.querySelectorAll('.qte-arrow').forEach(a=>a.remove());
    
    const jfA=document.getElementById('qte-jf-area');
    jfA.innerHTML='';jfA.appendChild(JellyfishRenderer.create(sp,1.5));
    
    // Switch screen immediately to make it seamless
    ScreenManager.show('qte');
    
    // Clear any previous listeners, timeout and session trackers safely
    if(this.keyHandler) document.removeEventListener('keydown', this.keyHandler);
    if(this.startTimeout) clearTimeout(this.startTimeout);
    if(this.rafId) cancelAnimationFrame(this.rafId);
    this.session = null;
    
    // Display a short transitional alert toast
    showToast('打捞即将开始...');
    
    // 1-second blank delay period before music scheduling and notes generation
    this.startTimeout = setTimeout(() => {
      const mi=AudioEngine.schedulePiece(sp.piece);
      const step=sp.rarity<=2?4:(sp.rarity<=3?3:2);
      const seq=[],filt=mi.beatTimes.filter((_,i)=>i%step===0);
      const max=Math.min(filt.length,sp.rarity<=2?12:(sp.rarity<=3?16:20));
      for(let i=0;i<max;i++){const bt=filt[i];if(!bt)break;seq.push({beat:bt.beat,time:bt.time,dir:this.DIRS[Math.floor(Math.random()*4)],state:'pending',el:null})}
      
      this.session={speciesId,sp,sequence:seq,score:0,combo:0,maxCombo:0,totalHits:0,perfects:0,startTime:mi.startTime,duration:mi.duration,secPerBeat:mi.secPerBeat,endTime:mi.startTime+mi.duration,laneWidth:lane.offsetWidth};
      seq.forEach(s=>{const el=document.createElement('div');el.className='qte-arrow';el.textContent=this.SYM[s.dir];el.style.display='none';lane.appendChild(el);s.el=el});
      
      this.keyHandler=e=>{if(this.DIRS.includes(e.key)){e.preventDefault();this.handleInput(e.key)}};
      document.addEventListener('keydown',this.keyHandler);
      this.renderLoop();
    }, 1000);
  },
  renderLoop(){
    if(!this.session)return;
    const now=AudioEngine.ctx.currentTime,s=this.session,hzx=130,at=2.5;
    s.sequence.forEach(ar=>{
      if(ar.state==='pending'||ar.state==='hit_anim'){
        const tu=ar.time-now;
        if(tu<at+.5&&tu>-1){ar.el.style.display='flex';ar.el.style.left=(hzx+(tu/at)*(s.laneWidth-hzx-60))+'px'}
        if(ar.state==='pending'&&tu<-.4){ar.state='missed';ar.el.classList.add('missed');s.combo=0;this.updateCombo()}
      }
    });
    if(now>s.endTime+.5){this.showResults();return}
    this.rafId=requestAnimationFrame(()=>this.renderLoop());
  },
  handleInput(dir){
    if(!this.session)return;
    const now=AudioEngine.ctx.currentTime,s=this.session;
    let best=null,bd=Infinity;
    s.sequence.forEach(a=>{if(a.state!=='pending'||a.dir!==dir)return;const d=Math.abs(a.time-now);if(d<bd&&d<.5){bd=d;best=a}});
    if(!best)return;
    
    let grade,pts;
    if(bd<.08){grade='perfect';pts=100;s.perfects++}
    else if(bd<.18){grade='good';pts=60}
    else if(bd<.35){grade='ok';pts=30}
    else return;
    
    best.state='hit_anim';best.el.classList.add('hit-'+grade);
    s.combo++;s.totalHits++;if(s.combo>s.maxCombo)s.maxCombo=s.combo;
    
    // Accurate score calculation with net multipliers (silver net +10%, golden net +25%)
    let netBonus = 1.0;
    if ((GameState.state.inventory.net_golden || 0) > 0) netBonus = 1.25;
    else if ((GameState.state.inventory.net_silver || 0) > 0) netBonus = 1.10;
    
    let finalPts = Math.round(pts * netBonus);
    let comboMult = 1 + Math.floor(s.combo / 5) * 0.2;
    let scoreGained = Math.round(finalPts * comboMult);
    
    s.score += scoreGained;
    document.getElementById('qte-score').textContent=s.score;this.updateCombo();
    AudioEngine.playSfx('hit');
    
    const fb=document.getElementById('qte-feedback');
    fb.textContent=(grade==='perfect'?'PERFECT! ':grade==='good'?'GOOD ':'OK ') + '+' + scoreGained;
    fb.className='qte-feedback show '+grade;setTimeout(()=>fb.classList.remove('show'),300);
    setTimeout(()=>{best.el.style.opacity='0'},200);
  },
  updateCombo(){const s=this.session;if(!s)return;document.getElementById('qte-combo').textContent=s.combo>1?s.combo+'x COMBO':''},
  showResults(){
    if(this.rafId)cancelAnimationFrame(this.rafId);
    if(this.keyHandler)document.removeEventListener('keydown',this.keyHandler);
    AudioEngine.stopAllScheduled();
    const s=this.session;if(!s)return;
    
    const tot=s.sequence.length;
    const hasNet = ((GameState.state.inventory.net_silver || 0) > 0 || (GameState.state.inventory.net_golden || 0) > 0);
    
    let cr, ql, ge;
    if (!hasNet && s.totalHits < tot) {
      // No net owned, and did not achieve 100% hits (did not pass all)
      cr = 'escape';
      ql = '未全部命中！没有购买渔网的情况下，至少需要全部通过（100%全部命中）才能捕获成功！';
      ge = 5;
    } else {
      const hr = tot > 0 ? s.totalHits / tot : 0;
      if(hr < .3){
        cr = 'escape';
        ql = '逃跑了...';
        ge = 5;
      } else if(hr < .6){
        cr = 'common';
        ql = '普通品质';
        ge = 15 + s.sp.rarity * 5;
      } else if(hr < .85){
        cr = 'healthy';
        ql = '健康品质';
        ge = 30 + s.sp.rarity * 10;
      } else {
        cr = 'pristine';
        ql = '完美品质!';
        ge = 60 + s.sp.rarity * 20;
      }
    }
    
    GameState.addGold(ge);
    if(cr!=='escape'){
      const col=GameState.state.collection[s.speciesId];col.discovered=true;col.count++;col.quality=Math.max(col.quality,cr==='pristine'?3:cr==='healthy'?2:1);
      const tank=GameState.state.tanks.find(t=>!t.jellyfish||t.jellyfish.length<3);
      if(tank){if(!tank.jellyfish)tank.jellyfish=[];tank.jellyfish.push(s.speciesId)}
      GameState.state.stats.totalCaught++;GameState.save();AudioEngine.playSfx('catch');
    }else{AudioEngine.playSfx('miss')}
    
    const card=document.getElementById('qte-results-card');
    card.innerHTML=`<h2>${cr==='escape'?'水母逃跑了!':'捕获成功!'}</h2><div class="result-jf" id="result-jf"></div><div class="result-stats">命中: ${s.totalHits}/${tot} | 最大连击: ${s.maxCombo} | Perfect: ${s.perfects}</div><div class="result-stats" style="padding: 0 10px; line-height: 1.4;">${ql}</div><div class="result-gold">+${ge} 金币</div><button id="qte-back-btn">返回</button>`;
    if(cr!=='escape')document.getElementById('result-jf').appendChild(JellyfishRenderer.create(s.sp,1.1));
    document.getElementById('qte-results').classList.add('show');
    document.getElementById('qte-back-btn').onclick=()=>{
      this.session=null;
      ScreenManager.show('main');
      AudioEngine.playBgm(); // Continue Chopin BGM
    };
  }
};

  getItemCategory(it){
    if (it.id.startsWith('water_')) return 'water';
    if (it.id.startsWith('net_')) return 'net';
    if (it.id.startsWith('tank_')) return 'tank';
    if (it.id.startsWith('decor_')) return 'decor';
    return 'all';
  },
  render(){
    if (!this.initialized) { this.init(); this.initialized = true; }
    const g=document.getElementById('shop-grid');g.innerHTML='';
    SHOP_ITEMS.forEach(it=>{
      const cat = this.getItemCategory(it);
      if (this.activeCategory !== cat) return;
      const cb=GameState.getGold()>=it.cost&&this.checkReq(it);
      const el=document.createElement('div');el.className='shop-item';
      el.innerHTML=`<h3>${it.icon} ${it.name}</h3><div class="shop-desc">${it.desc}</div><div class="shop-cost">${it.cost} 金币</div><button class="shop-buy-btn" ${cb?'':'disabled'}>购买</button>`;el.querySelector('.shop-buy-btn').addEventListener('click',()=>this.buy(it));g.appendChild(el)
    });
  },
  checkReq(it){
    if(it.limit!==undefined && (GameState.state.inventory[it.id] || 0) >= it.limit) return false;
    if(!it.req)return true;
    if(it.req.waterQuality!==undefined&&GameState.state.waterQuality!==it.req.waterQuality)return false;
    return true;
  },
  buy(it){
    if(GameState.getGold()<it.cost||!this.checkReq(it))return;
    GameState.addGold(-it.cost);
    if(it.type === 'tool' || it.type === 'decor') {
      GameState.state.inventory[it.id]=(GameState.state.inventory[it.id]||0)+1;
    }
    else if(it.effect && it.effect.waterQuality!==undefined) {
      GameState.state.waterQuality=it.effect.waterQuality;
      if(it.effect.waterQuality >= 1) {
        const tip = document.getElementById('main-water-tip');
        if(tip) tip.style.display = 'none';
      }
    }
    else if(it.effect && it.effect.addTank){
      if(GameState.state.tanks.length<6) {
        GameState.state.tanks.push({
          id:GameState.state.tanks.length,
          quality:1,
          jellyfish:[],
          decor:{decor_weed:0,decor_coral:0,decor_pearl:0}
        });
      }
      else{showToast('水母缸已达上限');return}
    }else if(it.effect && it.effect.upgradeTank){
      const t=GameState.state.tanks.find(t=>t.quality<5);if(t)t.quality++;else{showToast('所有水母缸已满级');return}
    }
    GameState.save();
    showToast('购买成功: '+it.name);
    this.render();
  }
};

function mgOpen(title,content){

  box.innerHTML=`<button class="mg-play-close" id="mg-close">&times;</button><h2>${title}</h2><div class="mg-play-area" id="mg-area">${content}</div>`;

function mgClose(){document.getElementById('mg-play-overlay').classList.remove('show')}
function mgReward(gold){GameState.addGold(gold);showToast(`+${gold} 金币!`)}
/* Memory game */
function MG_Memory(){
  const emojis=['🐙','🦀','🐠','🐡','🦈','🐳','🦑','🐚'];
  const pairs=emojis.slice(0,6);let cards=[...pairs,...pairs];
  for(let i=cards.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[cards[i],cards[j]]=[cards[j],cards[i]]}
  let html='<div class="mem-grid" style="grid-template-columns:repeat(4,56px)">';
  cards.forEach((c,i)=>html+=`<div class="mem-cell" data-idx="${i}" data-val="${c}">${c}</div>`);
  html+='</div><div class="mg-result" id="mem-result"></div>';
  mgOpen('记忆翻牌',html);
  let flipped=[],matched=0,moves=0;
  document.querySelectorAll('.mem-cell').forEach(cell=>{
    cell.addEventListener('click',function(){
      if(this.classList.contains('flipped')||this.classList.contains('matched')||flipped.length>=2)return;
      AudioEngine.playSfx('mb_click');
      this.classList.add('flipped');flipped.push(this);
      if(flipped.length===2){
        moves++;
        if(flipped[0].dataset.val===flipped[1].dataset.val){
          flipped.forEach(f=>f.classList.add('matched'));matched+=2;flipped=[];
          AudioEngine.playSfx('mb_win');
          if(matched===cards.length){
            const gold=Math.max(20,60-moves*3);
            document.getElementById('mem-result').innerHTML=`完成! ${moves}步 +${gold}金币<br><div style="margin-top:15px;display:flex;gap:10px;justify-content:center;"><button class="mg-btn" id="mem-retry-btn" style="padding:6px 16px;font-size:12px">再来一次</button><button class="mg-btn" id="mem-exit-btn" style="padding:6px 16px;font-size:12px;background:rgba(200,80,80,0.2);border-color:rgba(240,100,100,0.4)">退出游戏</button></div>`;
            mgReward(gold);
            document.getElementById('mem-retry-btn').onclick = () => MG_Memory();
            document.getElementById('mem-exit-btn').onclick = () => mgClose();
          }
        }else{
          setTimeout(()=>{
            AudioEngine.playSfx('mb_lose');
            flipped.forEach(f=>f.classList.remove('flipped'));flipped=[]
          },600)
        }
      }
    });
  });
}
/* Reaction test */
function MG_Reaction(){
  mgOpen('反应测试','<div class="react-circle react-wait" id="react-circle"></div><div style="font-size:13px;color:rgba(150,190,230,.6)">等待变绿后立即点击</div><div class="mg-result" id="react-result"></div>');
  const circle=document.getElementById('react-circle');
  let startTime=0,state='wait',timeout;
  const delay=1500+Math.random()*3000;
  timeout=setTimeout(()=>{circle.classList.remove('react-wait');circle.classList.add('react-go');startTime=Date.now();state='go'},delay);
  circle.addEventListener('click',function(){
    if(state==='wait'){
      clearTimeout(timeout);
      AudioEngine.playSfx('mb_lose');
      circle.classList.add('react-early');
      document.getElementById('react-result').innerHTML=`太早了!<br><div style="margin-top:15px;display:flex;gap:10px;justify-content:center;"><button class="mg-btn" id="react-retry-btn" style="padding:6px 16px;font-size:12px">重新挑战</button><button class="mg-btn" id="react-exit-btn" style="padding:6px 16px;font-size:12px;background:rgba(200,80,80,0.2);border-color:rgba(240,100,100,0.4)">退出游戏</button></div>`;
      state='done';
      document.getElementById('react-retry-btn').onclick = () => MG_Reaction();
      document.getElementById('react-exit-btn').onclick = () => mgClose();
    }
    else if(state==='go'){
      const rt=Date.now()-startTime;const gold=rt<200?40:rt<350?25:rt<500?15:10;
      AudioEngine.playSfx('mb_win');
      document.getElementById('react-result').innerHTML=`${rt}ms! +${gold}金币<br><div style="margin-top:15px;display:flex;gap:10px;justify-content:center;"><button class="mg-btn" id="mem-retry-btn" style="padding:6px 16px;font-size:12px">再来一次</button><button class="mg-btn" id="react-exit-btn" style="padding:6px 16px;font-size:12px;background:rgba(200,80,80,0.2);border-color:rgba(240,100,100,0.4)">退出游戏</button></div>`;
      mgReward(gold);
      state='done';
      document.getElementById('mem-retry-btn').onclick = () => MG_Reaction();
      document.getElementById('react-exit-btn').onclick = () => mgClose();
    }
  });
}
/* Number guess */
function MG_Guess(){
  const target=Math.floor(Math.random()*100)+1;let attempts=0;
  mgOpen('猜数字','<div style="font-size:13px;color:rgba(150,190,230,.6);margin-bottom:12px">猜一个1-100的数字</div><input class="guess-input" id="guess-inp" type="number" min="1" max="100" placeholder="?"><button class="mg-btn" id="guess-btn" style="margin-left:8px">猜</button><div class="guess-hint" id="guess-hint"></div><div class="mg-result" id="guess-result"></div>');
  document.getElementById('guess-btn').addEventListener('click',()=>{
    const v=parseInt(document.getElementById('guess-inp').value);if(isNaN(v))return;attempts++;
    if(v===target){
      const gold=Math.max(15,50-attempts*5);
      AudioEngine.playSfx('mb_win');
      document.getElementById('guess-result').innerHTML=`答对了! ${attempts}次 +${gold}金币<br><div style="margin-top:15px;display:flex;gap:10px;justify-content:center;"><button class="mg-btn" id="guess-retry-btn" style="padding:6px 16px;font-size:12px">再来一次</button><button class="mg-btn" id="guess-exit-btn" style="padding:6px 16px;font-size:12px;background:rgba(200,80,80,0.2);border-color:rgba(240,100,100,0.4)">退出游戏</button></div>`;
      mgReward(gold);
      document.getElementById('guess-btn').disabled=true;
      document.getElementById('guess-retry-btn').onclick = () => MG_Guess();
      document.getElementById('guess-exit-btn').onclick = () => mgClose();
    }
    else{
      AudioEngine.playSfx('mb_lose');
      document.getElementById('guess-hint').textContent=v<target?'太小了!':'太大了!'
    }
  });
  document.getElementById('guess-inp').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('guess-btn').click()});
}
/* Sequence memory */
function MG_Sequence(){
  const colors=['#e74c3c','#3498db','#2ecc71','#f39c12'];
  let seq=[],level=0,inputIdx=0,showing=false;
  let html='<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;width:180px">';
  colors.forEach((c,i)=>html+=`<div class="mg-btn seq-btn" data-idx="${i}" style="width:80px;height:80px;background:${c};opacity:0.4;border-radius:12px;border:none"></div>`);
  html+='</div><div style="margin-top:12px;font-size:13px;color:rgba(150,190,230,.6)" id="seq-status">准备...</div><div class="mg-result" id="seq-result"></div>';
  mgOpen('序列记忆',html);
  const btns=document.querySelectorAll('.seq-btn');
  function nextRound(){
    level++;seq.push(Math.floor(Math.random()*4));inputIdx=0;showing=true;
    document.getElementById('seq-status').textContent=`第${level}轮 - 观察...`;
    let i=0;const iv=setInterval(()=>{
      btns.forEach(b=>b.style.opacity='0.4');
      if(i<seq.length){
        btns[seq[i]].style.opacity='1';
        AudioEngine.playSfx('mb_click');
        setTimeout(()=>btns[seq[i]].style.opacity='0.4',400);i++
      }
      else{clearInterval(iv);showing=false;document.getElementById('seq-status').textContent='你的回合!'}
    },600);
  }
  btns.forEach(btn=>{btn.addEventListener('click',function(){
    if(showing)return;
    const idx=parseInt(this.dataset.idx);
    this.style.opacity='1';setTimeout(()=>this.style.opacity='0.4',200);
    AudioEngine.playSfx('mb_click');
    if(idx===seq[inputIdx]){
      inputIdx++;
      if(inputIdx===seq.length){
        AudioEngine.playSfx('mb_win');
        if(level>=8){
          const gold=80;
          document.getElementById('seq-result').innerHTML=`通关! +${gold}金币<br><div style="margin-top:15px;display:flex;gap:10px;justify-content:center;"><button class="mg-btn" id="seq-retry-btn" style="padding:6px 16px;font-size:12px">再来一次</button><button class="mg-btn" id="seq-exit-btn" style="padding:6px 16px;font-size:12px;background:rgba(200,80,80,0.2);border-color:rgba(240,100,100,0.4)">退出游戏</button></div>`;
          mgReward(gold);
          document.getElementById('seq-retry-btn').onclick = () => MG_Sequence();
          document.getElementById('seq-exit-btn').onclick = () => mgClose();
        }
        else{document.getElementById('seq-status').textContent='正确!';setTimeout(nextRound,800)}
      }
    }else{
      AudioEngine.playSfx('mb_lose');
      const gold=Math.max(5,level*10);
      document.getElementById('seq-result').innerHTML=`到第${level}轮 +${gold}金币<br><div style="margin-top:15px;display:flex;gap:10px;justify-content:center;"><button class="mg-btn" id="seq-retry-btn" style="padding:6px 16px;font-size:12px">再来一次</button><button class="mg-btn" id="seq-exit-btn" style="padding:6px 16px;font-size:12px;background:rgba(200,80,80,0.2);border-color:rgba(240,100,100,0.4)">退出游戏</button></div>`;
      mgReward(gold);
      document.getElementById('seq-retry-btn').onclick = () => MG_Sequence();
      document.getElementById('seq-exit-btn').onclick = () => mgClose();
    }
  })});
  setTimeout(nextRound,800);
}
/* === SAVE SLOTS SYSTEM === */
function renderSaveSlots() {
  const container = document.getElementById('slot-select-container');
  container.innerHTML = '';
  for(let i=1; i<=3; i++) {
    const s = localStorage.getItem('memo_save_slot_' + i);
    let infoHtml = '';
    let hasData = false;
    let parsed = null;
    if(s) {
      try {
        parsed = JSON.parse(s);
        hasData = true;
      } catch(e) {
        parsed = null;
      }
    }
    
    if(hasData && parsed) {
      const gold = Math.floor(parsed.gold || 0);
      let jfCount = 0;
      if(parsed.tanks) {
        parsed.tanks.forEach(t => {
          if(t.jellyfish) jfCount += t.jellyfish.length;
        });
      }
      infoHtml = `💰 金币: ${gold}<br>🪼 水母数: ${jfCount}<br>🌊 海水品质: ★${parsed.waterQuality || 0}`;
    } else {
      infoHtml = '<span style="opacity: 0.5;">- 无记忆碎片 -</span>';
    }
    
    const card = document.createElement('div');
    card.className = 'slot-card';
    card.innerHTML = `
      <div class="slot-title">记录盘 #${i}</div>
      <div class="slot-info">${infoHtml}</div>
      <div class="slot-btn-group">
        <button class="slot-btn enter-btn" data-slot="${i}">${hasData ? '进入记忆' : '开启旅程'}</button>
        ${hasData ? `<button class="slot-btn del-btn" data-slot="${i}">抹除</button>` : ''}
      </div>
    `;
    
    card.querySelector('.enter-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      selectSlot(i);
    });
    if(hasData) {
      card.querySelector('.del-btn').addEventListener('click', (e) => {
        e.stopPropagation();
        deleteSlot(i);
      });
    }
    container.appendChild(card);
  }
}

function selectSlot(slotNum) {
  currentSlot = slotNum;
  
  const saveOverlay = document.getElementById('save-overlay');
  saveOverlay.classList.remove('show');
  
  // Completely hide save-overlay after 600ms transition to avoid blocking mouse clicks
  setTimeout(() => {
    saveOverlay.style.display = 'none';
  }, 600);
  
  init();
  setTimeout(() => {
    AudioEngine.playBgm();
  }, 500);
}

function deleteSlot(slotNum) {
  if(confirm(`⚠️ 警告：确定要永久抹除 [记录盘 #${slotNum}] 的记忆吗？此数据将一去不复返！`)) {
    localStorage.removeItem('memo_save_slot_' + slotNum);
    renderSaveSlots();
  }
}

/* === TOAST === */
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}
/* === INIT === */
function init(){
  AudioEngine.init();GameState.init();
  GameState.subscribe(()=>{document.getElementById('gold-count').textContent=GameState.getGold()});
  document.getElementById('gold-count').textContent=GameState.getGold();
  
  if(GameState.state.waterQuality >= 1) {
    const tip = document.getElementById('main-water-tip');
    if(tip) tip.style.display = 'none';
  }

  document.querySelectorAll('.top-bar-btn').forEach(btn=>btn.addEventListener('click',()=>{
    ObserveUI.hideObservePopover();
    ScreenManager.show(btn.dataset.screen);
  }));
  document.getElementById('btn-catch').addEventListener('click',()=>{
    if(GameState.state.waterQuality <= 0) {
      showToast('⚠️ 无法打捞：缸中没有海水！请先去【商店】购买【基础海水】🧪。');
      return;
    }
    ScreenManager.show('catch');
  });
  document.getElementById('catch-back').addEventListener('click',()=>{CatchScene.leave();ScreenManager.show('main')});
  document.getElementById('observe-back').addEventListener('click',()=>{
    ObserveUI.hideObservePopover();
    ScreenManager.show('main');
  });
  document.getElementById('mg-back-btn').addEventListener('click',()=>ScreenManager.show('main'));
  
  document.getElementById('observe-ocean').addEventListener('click', () => {
    ObserveUI.hideObservePopover();
  });

  // Bind QTE Game Quit button
  document.getElementById('qte-quit-btn').addEventListener('click', () => {
    if(QTESystem.rafId) cancelAnimationFrame(QTESystem.rafId);
    if(QTESystem.keyHandler) document.removeEventListener('keydown', QTESystem.keyHandler);
    AudioEngine.stopAllScheduled();
    QTESystem.session = null;
    ScreenManager.show('main');
    AudioEngine.playBgm();
    showToast('已主动退出打捞');
  });

  // Toggle decor panel inside single tank observe screen
  document.getElementById('observe-decor-toggle').addEventListener('click', (e) => {
    e.stopPropagation();
    const panel = document.getElementById('decor-panel');
    panel.classList.toggle('show');
    if(panel.classList.contains('show')) {
      ObserveUI.renderDecorPanel();
    }
  });

  setInterval(()=>{
    let inc=0;
    GameState.state.tanks.forEach(t=>{
      if(!t.jellyfish)return;
      t.jellyfish.forEach(jfId=>{
        const sp=SPECIES.find(s=>s.id===jfId);
        if(sp)inc+=sp.goldPerMin*t.quality*GameState.state.waterQuality;
      })
    });
    if(inc>0)GameState.addGold(inc/60)
  },1000);
  TankManager.render();
}

// Stage 1 logo click transitions smoothly to Stage 2 multi-save slot panel
document.getElementById('start-overlay').addEventListener('click', () => {
  const startOverlay = document.getElementById('start-overlay');
  startOverlay.classList.add('hidden');
  
  // Completely hide start-overlay after 600ms transition to avoid blocking mouse clicks
  setTimeout(() => {
    startOverlay.style.display = 'none';
  }, 600);
  
  const saveOverlay = document.getElementById('save-overlay');
  saveOverlay.style.display = 'flex'; // Re-set display to ensure visibility
  saveOverlay.classList.add('show');
  renderSaveSlots();
});
</script>
